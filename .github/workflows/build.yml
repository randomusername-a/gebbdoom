name: build-book
on:
  workflow_dispatch: 

jobs:
  build-book:
    runs-on: ubuntu-slim
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up environment
        run: |
          apt install inkscape texlive texlive-font-utils texlive-fonts-recommended texlive-latex-extra golang-go
      - name: Build the book
        run: |
          bash make.sh
      - name: Upload the book
        uses: actions/upload-artifact@v7
        with:
          path: ./*.pdf
